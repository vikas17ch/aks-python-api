<!DOCTYPE html>
<html>
<head>
    <title>Vikas SRE Pro Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background: #f0f2f5; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        input:focus { border-color: #0078d4; }
        button { padding: 10px 20px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 6px; transition: 0.2s; }
        button:hover { background: #005a9e; }
        .search-box { background: #e7f3ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border-bottom: 1px solid #eee; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        li:last-child { border-bottom: none; }
        .del-btn { background: #d11a2a; padding: 6px 12px; font-size: 12px; }
        .del-btn:hover { background: #a51421; }
        .meta { font-size: 11px; color: #888; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 SRE User Management Pro</h2>
        
        <div class="controls">
            <input type="text" id="userName" placeholder="New User Name...">
            <button onclick="addUser()">Add User</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchQuery" placeholder="Search by name..." onkeyup="searchUser()">
            <button onclick="fetchUsers()">Show All</button>
        </div>
        
        <h3>Database Records:</h3>
        <ul id="userList"></ul>
    </div>

    <script>
        // Load all users
        async function fetchUsers() {
            document.getElementById('searchQuery').value = '';
            const res = await fetch('/users');
            const data = await res.json();
            renderList(data.database_records);
        }

        // Search users in real-time
        async function searchUser() {
            const query = document.getElementById('searchQuery').value;
            if (query.length < 1) { fetchUsers(); return; }
            
            const res = await fetch(`/search?name=${query}`);
            const data = await res.json();
            renderList(data.results);
        }

        async function addUser() {
            const name = document.getElementById('userName').value;
            if (!name) return;
            await fetch(`/add?name=${name}`);
            document.getElementById('userName').value = '';
            fetchUsers();
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure?')) return;
            await fetch(`/delete?id=${id}`);
            fetchUsers();
        }

        function renderList(records) {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            records.forEach(user => {
                list.innerHTML += `
                    <li>
                        <div>
                            <b>${user[1]}</b>
                            <span class="meta">ID: ${user[0]} | Created: ${user[2]}</span>
                        </div>
                        <button class="del-btn" onclick="deleteUser(${user[0]})">Delete</button>
                    </li>`;
            });
        }

        fetchUsers();
    </script>
</body>
</html>
