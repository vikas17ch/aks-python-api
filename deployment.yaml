apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-api
  template:
    metadata:
      labels:
        app: python-api
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: python-api
        image: vikasregk4e2.azurecr.io/python-api # GitHub will add the tag here
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "vikas-pg-server-k4e2.postgres.database.azure.com"
        - name: DB_USER
          value: "psqladmin"
        - name: DB_PASSWORD
          value: "Password1234!"
---
apiVersion: v1
kind: Service
metadata:
  name: python-api-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: python-api